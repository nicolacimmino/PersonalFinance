openapi: 3.0.3
info:
  title: Personal Finance API
  description: Node.js API server for Personal Finance application
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:8001
    description: Development server
  - url: http://localhost:8001/api
    description: API base path

tags:
  - name: Health
    description: Health check endpoints
  - name: Transactions
    description: Transaction management
  - name: Categories
    description: Category management
  - name: Accounts
    description: Account management
  - name: Budgets
    description: Budget management
  - name: Alerts
    description: Alert management
  - name: Receipts
    description: Receipt management
  - name: Reports
    description: Reporting and analytics

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the API server
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/transactions:
    get:
      tags:
        - Transactions
      summary: Get transactions
      description: Retrieve transactions with optional filters
      parameters:
        - name: category
          in: query
          description: Filter by category code
          required: false
          schema:
            type: string
        - name: account
          in: query
          description: Filter by account ID
          required: false
          schema:
            type: integer
        - name: date_from
          in: query
          description: Filter transactions from this date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Filter transactions until this date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Transactions
      summary: Create a new transaction
      description: Create a new transaction in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransaction'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/transactions/{id}:
    get:
      tags:
        - Transactions
      summary: Get transaction by ID
      description: Retrieve a single transaction by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID
          schema:
            type: integer
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Transactions
      summary: Update transaction
      description: Update specific fields of a transaction
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTransaction'
      responses:
        '200':
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/categories:
    get:
      tags:
        - Categories
      summary: Get all categories
      description: Retrieve all available categories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/accounts:
    get:
      tags:
        - Accounts
      summary: Get all accounts
      description: Retrieve all accounts
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/accounts/{id}:
    get:
      tags:
        - Accounts
      summary: Get account by ID
      description: Retrieve a single account by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Account ID
          schema:
            type: integer
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/budgets:
    get:
      tags:
        - Budgets
      summary: Get all budgets
      description: Retrieve all budgets with spending information
      responses:
        '200':
          description: List of budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Budget'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/alerts:
    get:
      tags:
        - Alerts
      summary: Get all alerts
      description: Retrieve all system alerts
      responses:
        '200':
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/receipts:
    get:
      tags:
        - Receipts
      summary: Get all receipts
      description: Retrieve all receipts
      responses:
        '200':
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Receipt'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/receipts/{id}:
    get:
      tags:
        - Receipts
      summary: Get receipt by ID
      description: Retrieve a single receipt by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Receipt ID
          schema:
            type: integer
      responses:
        '200':
          description: Receipt details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/receipts/{id}/pdf:
    get:
      tags:
        - Receipts
      summary: Get receipt PDF
      description: Download the PDF scan of a receipt
      parameters:
        - name: id
          in: path
          required: true
          description: Receipt ID
          schema:
            type: integer
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/reports/by_category:
    get:
      tags:
        - Reports
      summary: Get spending report by category
      description: Retrieve spending report grouped by category
      parameters:
        - name: date_from
          in: query
          description: Report start date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Report end date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Category spending report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportByCategory'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/reports/indicators:
    get:
      tags:
        - Reports
      summary: Get KPI indicators
      description: Retrieve key performance indicators
      parameters:
        - name: date_from
          in: query
          description: Indicator start date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          description: Indicator end date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: KPI indicators
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorReport'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication

  schemas:
    Transaction:
      type: object
      properties:
        id:
          type: integer
          description: Transaction ID
          example: 12345
        type:
          type: string
          description: Transaction type
          example: "DEBIT"
        account_id:
          type: integer
          description: Account ID
          example: 1
        account_name:
          type: string
          description: Account name
          example: "Main Checking"
        booking_date:
          type: string
          format: date-time
          description: Transaction booking date
          example: "2024-01-15T00:00:00.000Z"
        category:
          type: string
          description: Category code
          example: "GROCERIES"
        creditor_name:
          type: string
          description: Creditor/merchant name
          example: "SuperMarket Inc"
        description:
          type: string
          description: Transaction description
          example: "Weekly shopping"
        amount_cents:
          type: integer
          description: Transaction amount in cents
          example: -5499
        currency:
          type: string
          description: Transaction currency
          example: "EUR"
        amount_cents_in_ref_currency:
          type: integer
          description: Amount in reference currency (EUR) in cents
          example: -5499
        ref_currency:
          type: string
          description: Reference currency
          example: "EUR"
        account_to:
          type: integer
          nullable: true
          description: Destination account ID for transfers
          example: null
        account_to_name:
          type: string
          nullable: true
          description: Destination account name
          example: null
        receipt_id:
          type: integer
          nullable: true
          description: Associated receipt ID
          example: null

    CreateTransaction:
      type: object
      required:
        - amount_cents
        - account_id
      properties:
        amount_cents:
          type: integer
          description: Transaction amount in cents
          example: -5499
        category:
          type: string
          description: Category code
          example: "GROCERIES"
        description:
          type: string
          description: Transaction description
          example: "Weekly shopping"
        creditor_name:
          type: string
          description: Creditor/merchant name
          example: "SuperMarket Inc"
        account_id:
          type: integer
          description: Account ID
          example: 1
        account_to:
          type: integer
          description: Destination account ID for transfers
          example: null
        type:
          type: string
          description: Transaction type
          example: "DEBIT"
        booking_date:
          type: string
          format: date
          description: Transaction booking date (YYYY-MM-DD)
          example: "2024-01-15"
        value_date:
          type: string
          format: date
          description: Transaction value date (YYYY-MM-DD)
          example: "2024-01-15"

    PatchTransaction:
      type: object
      properties:
        category:
          type: string
          description: Category code
          example: "GROCERIES"
        description:
          type: string
          description: Transaction description
          example: "Updated description"
        account_to:
          type: integer
          description: Destination account ID for transfers
          example: 2
        type:
          type: string
          description: Transaction type
          example: "TRANSFER"

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Category UUID
          example: "123e4567-e89b-12d3-a456-426614174000"
        code:
          type: string
          description: Category code
          example: "GROCERIES"
        color:
          type: string
          description: Category display color
          example: "#FF5733"
        discontinued:
          type: string
          description: Discontinued status
          example: "N"

    Account:
      type: object
      properties:
        id:
          type: integer
          description: Account ID
          example: 1
        code:
          type: string
          description: Account code
          example: "CHECKING_01"
        description:
          type: string
          description: Account description
          example: "Main Checking Account"
        currency:
          type: string
          description: Account currency
          example: "EUR"
        iban:
          type: string
          description: Account IBAN
          example: "DE89370400440532013000"
        status:
          type: string
          description: Account status
          example: "ACTIVE"
        asset_type:
          type: string
          description: Asset type
          example: "CHECKING"
        pri_transactions_src:
          type: string
          description: Primary transaction source
          example: "BANK_API"
        balance_cents:
          type: integer
          description: Current balance in cents (account currency)
          example: 123456
        balance_eur_cents:
          type: integer
          description: Current balance in EUR cents
          example: 123456

    Budget:
      type: object
      properties:
        id:
          type: integer
          description: Budget ID
          example: 1
        from_date:
          type: string
          format: date-time
          description: Budget start date
          example: "2024-01-01T00:00:00.000Z"
        to_date:
          type: string
          format: date-time
          description: Budget end date
          example: "2024-01-31T23:59:59.999Z"
        code:
          type: string
          description: Budget code
          example: "MONTHLY_2024_01"
        description:
          type: string
          description: Budget description
          example: "January 2024 Budget"
        active:
          type: boolean
          description: Budget active status
          example: true
        currency:
          type: string
          description: Budget currency
          example: "EUR"
        amount_cents:
          type: integer
          description: Budget amount in cents
          example: 200000
        spent_cents_eur:
          type: integer
          description: Amount spent in EUR cents
          example: 150000
        spent_cents:
          type: integer
          description: Amount spent in budget currency cents
          example: 150000
        transactions:
          type: integer
          description: Number of transactions
          example: 45

    Alert:
      type: object
      properties:
        category:
          type: string
          description: Alert category
          enum:
            - BALANCE
            - CATEGORY_MISSING
            - CATEGORY_INVALID
            - ERROR
            - OVERSPENT
          example: "OVERSPENT"
        message:
          type: string
          description: Alert message
          example: "Budget exceeded by 50 EUR"
        item:
          type: string
          description: Item type
          enum:
            - BUDGETS
            - TRANSACTIONS
            - ACCOUNTS
          example: "BUDGETS"
        item_id:
          type: string
          description: Item ID
          example: "1"
        level:
          type: string
          description: Alert level
          enum:
            - WARN
            - ERROR
          example: "WARN"

    Receipt:
      type: object
      properties:
        id:
          type: integer
          description: Receipt ID
          example: 1
        date:
          type: string
          format: date-time
          description: Receipt date
          example: "2024-01-15T00:00:00.000Z"
        amount_cents:
          type: integer
          description: Receipt amount in cents
          example: 5499
        currency:
          type: string
          description: Receipt currency
          example: "EUR"
        ext_id:
          type: string
          description: External ID
          example: "EXT_12345"
        merchant_name:
          type: string
          description: Merchant name
          example: "SuperMarket Inc"
        merchant_address:
          type: string
          description: Merchant address
          example: "123 Main St, City"
        scan_file_name:
          type: string
          description: Scan file name
          example: "receipt_001.pdf"
        transaction_id:
          type: integer
          nullable: true
          description: Linked transaction ID
          example: 12345
        transaction_category:
          type: string
          nullable: true
          description: Transaction category
          example: "GROCERIES"
        transaction_amount_cents:
          type: integer
          nullable: true
          description: Transaction amount in cents
          example: -5499
        transaction_currency:
          type: string
          nullable: true
          description: Transaction currency
          example: "EUR"
        account_code:
          type: string
          nullable: true
          description: Account code
          example: "CHECKING_01"
        account_description:
          type: string
          nullable: true
          description: Account description
          example: "Main Checking Account"

    ReportByCategory:
      type: object
      properties:
        date_from:
          type: string
          format: date
          description: Report start date
          example: "2024-01-01"
        date_to:
          type: string
          format: date
          description: Report end date
          example: "2024-01-31"
        reports:
          type: array
          items:
            $ref: '#/components/schemas/ReportByCategoryEntry'

    ReportByCategoryEntry:
      type: object
      properties:
        category:
          type: string
          description: Category code
          example: "GROCERIES"
        type:
          type: string
          description: Category type
          example: "EXPENSE"
        currency:
          type: string
          description: Currency
          example: "EUR"
        total_cents:
          type: integer
          description: Total amount in cents
          example: -45000
        transactions_count:
          type: integer
          description: Number of transactions
          example: 12
        category_description:
          type: string
          description: Category description
          example: "Grocery Shopping"

    IndicatorReport:
      type: object
      properties:
        indicators:
          type: array
          items:
            $ref: '#/components/schemas/Indicator'
        ref_currency:
          type: string
          description: Reference currency
          example: "EUR"

    Indicator:
      type: object
      properties:
        label:
          type: string
          description: Indicator label
          example: "Total Income"
        total_cents:
          type: integer
          description: Indicator value in cents
          example: 500000
        currency:
          type: string
          description: Currency
          example: "EUR"

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Invalid request"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Invalid request parameters"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized - API key required"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Resource not found"
